# ==========================================
# 敏感信息配置模板
# 使用方法：
# 1. 复制此文件并重命名为 application-secret.yml
# 2. 在 application-secret.yml 中填入真实的密钥信息
# 3. application-secret.yml 已被添加到 .gitignore，不会被提交或被 AI 读取
# ==========================================

aliyun:
  oss:
    access-key-id: 你的阿里云AccessKeyId
    access-key-secret: 你的阿里云AccessKeySecret

wechat:
  miniapp:
    appid: 你的微信小程序AppID
    secret: 你的微信小程序Secret
    token: 你的微信Token(可选)
    aes-key: 你的微信EncodingAESKey(可选)

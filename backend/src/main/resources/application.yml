spring:
  output:
    ansi:
      enabled: always
  application:
    name: mofadanqing-backend
  
  # 引入本地密钥配置文件 (application-secret.yml)
  # 该文件应被 .gitignore 忽略，用于存放敏感信息
  config:
    import: optional:classpath:application-secret.yml

  # 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/mofadanqing?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: Zwj1314520,
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.mofadanqing.entity
  # configuration:
  #   log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # Disable stdout logging to reduce noise

logging:
  level:
    root: INFO
    com.mofadanqing: INFO
    org.springframework: WARN
    org.apache.ibatis: WARN
    org.mybatis: WARN
    com.baomidou.mybatisplus: WARN
    _org.springframework.web.servlet.HandlerMapping.Mappings: WARN


# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api

# JWT 配置
jwt:
  secret: mofadanqing_secret_key_2024
  expire: 86400

# Aliyun OSS 配置
aliyun:
  oss:
    endpoint: oss-cn-beijing.aliyuncs.com
    access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET}
    bucket-name: tzbmofadanqing

# 微信小程序配置
wechat:
  miniapp:
    appid: ${WECHAT_APPID:wx_sample_appid}
    secret: ${WECHAT_SECRET:wx_sample_secret}
    token: ${WECHAT_TOKEN:wx_sample_token}
    aes-key: ${WECHAT_AES_KEY:wx_sample_aes_key}
